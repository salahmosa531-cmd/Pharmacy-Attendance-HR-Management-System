name: pharmacy_attendance
description: "Enterprise Pharmacy Attendance & HR Management System"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  
  # Database - SQLite for offline-first
  sqflite_common_ffi: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # State Management
  provider: ^6.1.1
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Routing
  go_router: ^13.0.1
  
  # Security & Encryption
  encrypt: ^5.0.3
  crypto: ^3.0.3
  uuid: ^4.2.2
  
  # Date/Time handling
  intl: any
  
  # QR Code
  qr_flutter: ^4.1.0
  qr_code_scanner_plus: ^2.0.3
  mobile_scanner: ^3.5.5
  
  # Barcode scanning (for USB barcode scanners - keyboard wedge mode)
  # USB barcode scanners work through keyboard emulation - no additional package needed
  
  # Fingerprint integration
  # For DigitalPersona/ZKTeco - requires native SDK integration
  local_auth: ^2.1.7
  
  # PDF & Excel Export
  pdf: ^3.10.7
  printing: ^5.11.1
  excel: ^4.0.3
  
  # File operations
  file_picker: ^6.1.1
  share_plus: ^7.2.1
  
  # Network & Cloud sync (optional)
  http: ^1.1.2
  connectivity_plus: ^5.0.2
  
  # Window management
  window_manager: ^0.3.7
  
  # Device info for device binding
  device_info_plus: ^9.1.1
  
  # Logging
  logger: ^2.0.2+1
  
  # Settings persistence
  shared_preferences: ^2.2.2
  
  # Camera for QR scanning
  camera: ^0.10.5+9
  
  # JSON serialization
  json_annotation: ^4.8.1
  
  # Form validation
  flutter_form_builder: any
  form_builder_validators: any
  
  # Charts for dashboard
  fl_chart: ^0.65.0
  
  # Data table with pagination
  data_table_2: ^2.5.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  # Note: Assets and custom fonts commented out for initial build
  # Uncomment and add font files when needed
  # assets:
  #   - assets/images/
  #   - assets/icons/
